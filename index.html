<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agna Store - Coming Soon</title>
    <style>
        /* Reset dasar */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Latar belakang dan perataan tengah */
        body {
            background: linear-gradient(135deg, #1c1c1c 0%, #2d3436 100%);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        /* Kotak konten */
        .container {
            background: rgba(255, 255, 255, 0.05);
            padding: 50px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 90%;
            width: 450px;
        }

        /* Teks Judul */
        h1 {
            font-size: 2.8rem;
            margin-bottom: 15px;
            color: #f1c40f; /* Warna kuning emas */
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Teks Deskripsi */
        p {
            font-size: 1.2rem;
            color: #dcdde1;
            margin-bottom: 35px;
            line-height: 1.5;
        }

        .highlight {
            font-weight: bold;
            color: #ffffff;
        }

        /* Tombol WhatsApp */
        .wa-button {
            display: inline-block;
            background-color: #25D366; /* Warna hijau khas WhatsApp */
            color: white;
            text-decoration: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4);
            transition: all 0.3s ease;
        }

        /* Efek saat tombol disentuh/dihighlight */
        .wa-button:hover {
            background-color: #128C7E;
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(37, 211, 102, 0.6);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Agna Store</h1>
        <p>Situs web kami sedang dalam tahap pengembangan.<br><span class="highlight">Coming Soon!</span></p>
        
        <!-- Link WhatsApp: Angka 0 di depan diganti dengan 62 (Kode Negara Indonesia) -->
        <a href="https://wa.me/6282142614912" class="wa-button" target="_blank" rel="noopener noreferrer">
            💬 Hubungi via WhatsApp
        </a>
    </div>

</body>
</html>
